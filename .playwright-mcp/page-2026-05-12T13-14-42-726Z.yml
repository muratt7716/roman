                - heading "semud" [level=1] [ref=e224]
                - paragraph [ref=e225]: SONUN BAŞLADIĞI AN Gök, katran gibi karardı. Rüzgârın sesi önce fısıltılarla başladı, sonra iniltilere dönüştü. Sıcak toprak çatırdarken, kum tanecikleri havalanıp gökyüzüne savruldu. Bu diyarın toprakları bir zamanlar bereketle yoğrulmuş, devasa sütunlarla süslenmişti. İnsanlar saraylarında, bağlarında, pazar yerlerinde günlük telaşlarına gömülmüşken, felaket sessizce yaklaşıyordu. Derken, çığlıklar koptu. Ufukta beliren kara bulutlar hızla yayıldı, göğü kaplayan bir perde gibi şehrin üzerine çöktü. Rüzgârın gücü arttıkça, kum fırtınası surları dövüyor, devasa taş sütunları cılız bir dal parçası gibi gökyüzüne savuruyordu. Hayvanlar ürkerek sağa sola kaçışıyor, anneler çocuklarını kucaklayarak kapılara koşuyordu. Ama artık ne kapılar bir sığınak ne de taş duvarlar birer kalkan olabilirdi. Yedi gece, sekiz gün… Fırtına bir öfke gibi esti, göz gözü görmez oldu. İnsanlar, nefes almak için birbirlerine sarılıyor, fakat kum boğazlarına doluyor, ciğerlerine saplanıyordu. Yerin derinlerinden gelen bir uğultu, yaklaşan kıyametin habercisiydi. Fırtınanın kudreti ağaçları köklerinden sökerken, evleri paramparça ediyordu. Devasa bedenleriyle övünen, kendilerini yeryüzünün efendisi sanan bu diyarın insanları, birer birer fırtınaya kapılıp göğe savruldu. O anın içinde zaman kavramı yitip gitmişti. Gün ve gece, ışık ve karanlık birbirine karıştı. Çığlıklar, rüzgârın uğultusuna karışarak yok oldu. Gökyüzü, gazapla aydınlandı ve sonra tekrar karardı. Sonunda, her şey sustu. Kum fırtınasının çekildiği yerde sessizlik vardı. Bir zamanlar ihtişamlı sarayların olduğu topraklar artık bir mezara dönüşmüştü. Ne bir ses, ne bir nefes, ne de bir yaşam belirtisi kalmıştı. Ad kavmi, gururla inşa ettiği şehirlerin altında, rüzgârın bile unuttuğu bir hatıraya dönüşmüştü. Ve çöl, sırlarını saklayarak yoluna devam etti.
